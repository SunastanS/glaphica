name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      upload_artifacts:
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: glaphica

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libx11-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test
        run: cargo test --workspace --locked

      - name: Build
        run: cargo build --release --locked -p $BIN_NAME

      - name: Package
        if: ${{ inputs.upload_artifacts }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p package dist
          cp "target/release/$BIN_NAME" package/

          shopt -s nullglob
          for f in target/release/*.so; do
            cp "$f" package/
          done

          tar -czf "dist/glaphica-linux-x86_64.tar.gz" -C package .

      - name: Upload artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: glaphica-linux-x86_64
          path: dist/glaphica-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --locked -p $env:BIN_NAME

      - name: Package
        if: ${{ inputs.upload_artifacts }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Copy-Item "target/release/$env:BIN_NAME.exe" package/
          Get-ChildItem "target/release/*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName package/
          }

          Compress-Archive -Path package/* -DestinationPath "dist/glaphica-windows-x86_64.zip" -Force

      - name: Upload artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: glaphica-windows-x86_64
          path: dist/glaphica-windows-x86_64.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --locked -p $BIN_NAME

      - name: Package
        if: ${{ inputs.upload_artifacts }}
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p package dist
          cp "target/release/$BIN_NAME" package/

          shopt -s nullglob
          for f in target/release/*.dylib; do
            cp "$f" package/
          done

          tar -czf "dist/glaphica-macos.tar.gz" -C package .

      - name: Upload artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: glaphica-macos
          path: dist/glaphica-macos.tar.gz
